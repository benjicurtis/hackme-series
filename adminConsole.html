<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console</title>
</head>
<body style="background-color: #000; color: #0f0; border: 2px solid #0f0; font-family: SFMono, monospace; padding: 10px; margin-bottom: 20px;">
    <h1 style="background-color: #000; color: #0f0; border: 2px solid #0f0; font-family: SFMono, monospace; padding: 10px; margin-bottom: 20px;">Admin Console</h1>
    <p style="background-color: #000; color: #0f0; border: 2px solid #0f0; font-family: SFMono, monospace; padding: 10px; margin-bottom: 20px;">Welcome, Admin, Type help for command!</p>
    <p>C:\Users\Admin\Desktop: </p>
    <input type="text" id="command" style="background-color: #000; color: #0f0; border: 2px solid #0f0; font-family: SFMono, monospace; padding: 10px; margin-bottom: 20px;">
    <button id="execute" onclick="executeCommand()" style="background-color: #000; color: #0f0; border: 2px solid #0f0; font-family: SFMono, monospace; padding: 10px; margin-bottom: 20px;">Execute</button>
    <div id="output" style="background-color: #000; color: #0f0; font-family: SFMono, monospace;"></div>
    <script>
        function executeCommand(){
            let command = document.getElementById("command").value;
            if (command === "help"){
                document.getElementById("output").innerHTML = "help, echo, clear, whoami"
            } else if (command.includes("echo")){
                let text = document.getElementById("command").value
                text = text.replace("echo ", "")
                document.getElementById("output").innerHTML = text
            } else if (command === "whoami"){
                fetch("https://api.ipify.org?format=json")
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById("output").innerHTML = "<div>" + "adminPC " + data.ip + "</div>";
                    })
            } else if (command === "date"){
                document.getElementById("output").innerHTML = new Date()
            }
        }
    </script>
</body>
</html>
