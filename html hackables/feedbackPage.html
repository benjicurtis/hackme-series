<!DOCTYPE html>
<html>
    <body>
        <h1>feedback for:</h1>
        <input type="text" value="me@hack.er" id="feedback" disabled>
        <p>what went wrong?</p>
        <input type="text" id="input">
        <button id="submit" onclick="run()">Submit</button>
        <div id="text"></div>
        <script>
            feedback = []
            feedback.append(document.getElementById("feedback").value + document.getElementById("input").value)
            function run(){
                document.getElementById("text").innerHTML = feedback
            }
        </script>
    </body>
</html>
