<!DOCTYPE html>
<html>
    <body>
        <h1>Feedback From:</h1>
        <input type="text" value="me@hack.er" id="feedback" disabled>
        <p>what went wrong?</p>
        <input type="text" id="input">
        <button id="submit" onclick="run()">Submit</button>
        <div id="text"></div>
        <script>
            function run(){
                one = document.getElementById("input").value
                two = document.getElementById("feedback").value
                document.getElementById("text").innerHTML = two + " says " + one
            }
        </script>
    </body>
</html>
